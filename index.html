<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Administrasi Guru - Responsif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --rgb-speed: 3s;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .rgb-line {
            position: relative;
        }

        .rgb-line::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000);
            background-size: 200% auto;
            animation: rgb-move var(--rgb-speed) linear infinite;
        }

        .rgb-border {
            position: relative;
        }

        .rgb-border::before {
            content: '';
            position: absolute;
            inset: -1px;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(90deg, #ff0000, #00ff00, #00ffff, #ff0000);
            background-size: 200% auto;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rgb-move var(--rgb-speed) linear infinite;
            pointer-events: none;
        }

        @keyframes rgb-move {
            to { background-position: 200% center; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input, select, textarea {
            background: rgba(15, 23, 42, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            font-size: 16px !important; /* Mencegah zoom otomatis di iOS */
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #1e293b;
        }

        @media (min-width: 768px) {
            .iframe-wrapper { height: 75vh; }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Utility untuk tabel responsif */
        .custom-scrollbar-x {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#0f172a] z-[200] flex flex-col items-center justify-center text-center p-6">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-400 font-bold text-lg tracking-widest">MEMUAT SISTEM...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden flex items-center justify-center min-h-screen p-4 md:p-6">
        <div class="glass-card rgb-border w-full max-w-md p-6 md:p-10 rounded-3xl shadow-2xl animate-fade">
            <div class="text-center mb-8">
                <div class="bg-gradient-to-tr from-blue-600 to-purple-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
                    <i class="fas fa-user-lock fa-xl"></i>
                </div>
                <h1 class="text-2xl md:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Portal SIP-GURU</h1>
                <p class="text-slate-400 text-sm mt-2">Silakan masuk untuk akses administrasi.</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 border rounded-xl focus:outline-none transition-all" placeholder="ID Pengguna">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 border rounded-xl focus:outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 mt-2">
                    MASUK KE DASHBOARD <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
            <div id="login-error" class="hidden mt-4 p-3 bg-red-500/10 border border-red-500/50 text-red-400 text-xs rounded-lg text-center">
                Autentikasi gagal! Periksa kembali kredensial Anda.
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <!-- Header Responsif -->
        <nav class="glass-card border-b border-white/5 sticky top-0 z-50 rgb-line">
            <div class="container mx-auto px-4 md:px-6 h-16 md:h-20 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white p-2 rounded-lg text-sm md:text-base">
                        <i class="fas fa-database"></i>
                    </div>
                    <span class="font-black text-xl md:text-2xl tracking-tighter text-white">SIP<span class="text-blue-500">GURU</span></span>
                </div>
                <div class="flex items-center gap-3 md:gap-6">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-name" class="text-xs md:text-sm font-bold text-white"></p>
                        <p id="user-display-class" class="text-[9px] font-black text-blue-400 uppercase tracking-tighter"></p>
                    </div>
                    <button onclick="logout()" class="w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-red-500/20 text-slate-400 hover:text-red-500 transition-all border border-white/10">
                        <i class="fas fa-power-off text-sm"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-4 md:px-6 py-6 md:py-10 animate-fade flex-grow">
            <!-- Navigasi Tab Mobile & Desktop -->
            <div class="grid grid-cols-3 gap-2 md:gap-4 mb-6 md:mb-10">
                <button onclick="showSection('jurnal')" id="tab-jurnal" class="p-3 md:p-4 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black transition-all flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 border border-white/5">
                    <i class="fas fa-book-open text-base md:text-lg"></i> <span>JURNAL</span>
                </button>
                <button onclick="showSection('admin')" id="tab-admin" class="p-3 md:p-4 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black transition-all flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 border border-white/5">
                    <i class="fas fa-shield-halved text-base md:text-lg"></i> <span>ADMIN</span>
                </button>
                <button onclick="showSection('catatan')" id="tab-catatan" class="p-3 md:p-4 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black transition-all flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 border border-white/5">
                    <i class="fas fa-user-shield text-base md:text-lg"></i> <span>CATATAN</span>
                </button>
            </div>

            <div class="grid grid-cols-1 gap-6 lg:gap-10">
                <!-- Bagian Form -->
                <div class="glass-card rgb-border p-5 md:p-8 rounded-2xl md:rounded-3xl shadow-xl">
                    <!-- Form Jurnal -->
                    <section id="section-jurnal" class="space-y-5">
                        <h2 class="text-xl md:text-2xl font-black italic flex items-center gap-2"><i class="fas fa-pen-nib text-blue-500"></i> INPUT JURNAL</h2>
                        <form id="form-jurnal" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                            <div class="col-span-full grid grid-cols-2 gap-3">
                                <div class="bg-white/5 p-3 rounded-xl border border-white/5"><label class="text-[8px] font-black text-slate-500 uppercase block mb-1">GURU</label><p class="text-xs md:text-sm font-bold text-slate-200 user-name-readonly"></p></div>
                                <div class="bg-white/5 p-3 rounded-xl border border-white/5"><label class="text-[8px] font-black text-slate-500 uppercase block mb-1">KELAS</label><p class="text-xs md:text-sm font-bold text-slate-200 user-class-readonly"></p></div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Mata Pelajaran</label>
                                <select id="jurnal-mapel" required class="w-full px-4 py-3 border rounded-xl outline-none"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Topik Materi</label>
                                <input type="text" id="jurnal-topik" required class="w-full px-4 py-3 border rounded-xl outline-none" placeholder="Materi hari ini">
                            </div>
                            <div class="col-span-full space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Tujuan Pembelajaran</label>
                                <textarea id="jurnal-tujuan" required rows="2" class="w-full px-4 py-3 border rounded-xl outline-none" placeholder="Target capaian pembelajaran"></textarea>
                            </div>
                            <div class="col-span-full space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Tautan File (Drive)</label>
                                <input type="url" id="jurnal-link" class="w-full px-4 py-3 border rounded-xl outline-none" placeholder="https://drive.google.com/...">
                            </div>
                            <button type="submit" id="btn-jurnal" class="col-span-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">SUBMIT DATA JURNAL</button>
                        </form>
                    </section>

                    <!-- Form Admin -->
                    <section id="section-admin" class="hidden space-y-5">
                        <h2 class="text-xl md:text-2xl font-black italic flex items-center gap-2 text-indigo-400"><i class="fas fa-folder-open"></i> ADMINISTRASI GURU</h2>
                        <form id="form-admin" class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-xs font-bold user-name-readonly"></p></div>
                                <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-xs font-bold user-class-readonly"></p></div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Pilih Jenis Perangkat</label>
                                <select id="admin-jenis" required class="w-full px-4 py-3 border rounded-xl outline-none"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Link Google Drive</label>
                                <input type="url" id="admin-link" required class="w-full px-4 py-3 border rounded-xl outline-none" placeholder="Tautan dokumen perangkat">
                            </div>
                            <button type="submit" id="btn-admin" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">SIMPAN PERANGKAT</button>
                        </form>
                    </section>

                    <!-- Form Catatan -->
                    <section id="section-catatan" class="hidden space-y-5">
                        <h2 class="text-xl md:text-2xl font-black italic flex items-center gap-2 text-orange-400"><i class="fas fa-exclamation-circle"></i> CATATAN SISWA</h2>
                        <form id="form-catatan" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-xs font-bold text-slate-400 ml-1">Nama Siswa</label>
                                    <select id="select-siswa" required class="w-full px-4 py-3 border rounded-xl outline-none"></select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-bold text-slate-400 ml-1">Kategori</label>
                                    <select id="catatan-jenis" required class="w-full px-4 py-3 border rounded-xl outline-none"></select>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Kejadian/Keterangan</label>
                                <textarea id="catatan-keterangan" required rows="2" class="w-full px-4 py-3 border rounded-xl outline-none" placeholder="Detail kejadian..."></textarea>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400 ml-1">Tindak Lanjut</label>
                                <input type="text" id="catatan-tindakan" required class="w-full px-4 py-3 border rounded-xl outline-none" placeholder="Solusi/Hukuman yang diberikan">
                            </div>
                            <button type="submit" id="btn-catatan" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">SIMPAN CATATAN</button>
                        </form>
                    </section>
                </div>

                <!-- Rekap Data (Full Width) -->
                <div class="glass-card p-4 md:p-6 rounded-2xl md:rounded-3xl border border-white/5">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6">
                        <h3 class="font-black text-slate-200 flex items-center gap-2 tracking-widest text-sm md:text-base">
                            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            LOG AKTIVITAS: <span id="rekap-title-kelas" class="text-blue-400"></span>
                        </h3>
                        <button onclick="refreshData()" class="w-full sm:w-auto text-[10px] bg-white/5 hover:bg-white/10 text-blue-400 px-4 py-2 rounded-full font-bold border border-white/5 transition-all">
                            <i class="fas fa-sync-alt mr-1"></i> REFRESH DATA
                        </button>
                    </div>
                    <div class="custom-scrollbar-x">
                        <table class="w-full text-xs md:text-sm text-left border-separate border-spacing-y-2">
                            <thead class="text-slate-500 font-black uppercase text-[9px] tracking-widest">
                                <tr>
                                    <th class="px-4 py-2">Waktu</th>
                                    <th class="px-4 py-2" id="col-2">Data 1</th>
                                    <th class="px-4 py-2" id="col-3">Data 2</th>
                                    <th class="px-4 py-2 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="rekap-body" class="text-slate-300">
                                <!-- Data diisi via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Preview (Responsive) -->
    <div id="preview-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex flex-col z-[150]">
        <div class="p-4 md:p-6 flex justify-between items-center border-b border-white/10">
            <div class="truncate pr-4">
                <h3 class="text-white font-black text-base md:text-lg italic truncate" id="preview-title">PREVIEW DOKUMEN</h3>
                <p class="text-blue-400 text-[9px] md:text-xs tracking-widest uppercase truncate" id="preview-subtitle"></p>
            </div>
            <button onclick="closePreview()" class="bg-red-500/20 text-red-500 w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex-grow p-2 md:p-6">
            <div class="iframe-wrapper rgb-border h-full">
                <iframe id="preview-frame" src="about:blank"></iframe>
            </div>
        </div>
        <div class="p-4 flex gap-2 md:gap-4 justify-center">
            <a id="preview-download" href="#" target="_blank" class="flex-1 max-w-xs text-center py-3 bg-white/5 hover:bg-white/10 text-white rounded-xl font-bold text-xs border border-white/10 transition-all">
                <i class="fas fa-external-link-alt mr-2"></i> TAB BARU
            </a>
        </div>
    </div>

    <!-- Modal Alert -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="glass-card rgb-border p-8 rounded-3xl max-w-xs w-full text-center shadow-2xl animate-fade">
            <div id="modal-icon" class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border"></div>
            <h3 id="modal-title" class="text-xl font-black text-white">STATUS</h3>
            <p id="modal-msg" class="text-slate-400 text-sm mt-2 mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-black text-sm transition-all">MENGERTI</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxLjQ1MovYf_exWe5xjjLPnjfOYefVZGAf4buomwIcGs0DlXSUD7Ndi56NiWEXd5V9R_Q/exec"; 
        const TEACHERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFecIGSQIWeOFg9Vbl2oGz-B1mQ8h7b72h2VJ0PvgWZ1oXjruHFj_ok6bG9Cw_gV02Z0OY_epNAX-w/pub?gid=0&single=true&output=csv";
        const STUDENTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Mx_6kiws1Pt-kH14kXpp0nT36dNQyOa_7cWkMjyfoIv2TAsPzpjFeHJtKOZoGfNDDltRzAoqlVac/pub?gid=0&single=true&output=csv";
        
        let teachersData = [], studentsData = [], currentUser = null, currentTab = 'jurnal';

        const MAPELS = ["Pendidikan Agama", "Pendidikan Pancasila", "Bahasa Indonesia", "Matematika", "IPAS", "PJOK", "Seni Musik", "Seni Rupa", "Bahasa Sunda", "Bahasa Inggris"];
        const ADMIN_TYPES = ["CP", "TP", "ATP", "PROTA", "PROMES", "MODUL AJAR", "BANK SOAL"];
        const CATATAN_TYPES = ["Kedisiplinan", "Kebersihan", "Sikap/Perilaku", "Tugas/Akademik"];

        async function init() {
            try {
                const [tRes, sRes] = await Promise.all([fetch(TEACHERS_CSV_URL), fetch(STUDENTS_CSV_URL)]);
                teachersData = parseCSV(await tRes.text(), ['nama', 'kelas', 'user', 'pass']);
                studentsData = parseCSV(await sRes.text(), ['id', 'nama', 'jk', 'kelas']);
                
                // Isi Dropdown Statis
                fillSelect('jurnal-mapel', MAPELS);
                fillSelect('admin-jenis', ADMIN_TYPES);
                fillSelect('catatan-jenis', CATATAN_TYPES);

                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            } catch (err) { alert("Sistem gagal sinkronisasi. Periksa internet."); }
        }

        function parseCSV(csv, keys) {
            return csv.split('\n').slice(1).filter(r => r.trim()).map(row => {
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                let obj = {}; keys.forEach((key, i) => obj[key] = cols[i]);
                return obj;
            });
        }

        function fillSelect(id, items) {
            const s = document.getElementById(id);
            s.innerHTML = `<option value="">Pilih ${id.split('-')[1]}...</option>`;
            items.forEach(i => s.innerHTML += `<option value="${i}">${i}</option>`);
        }

        document.getElementById('login-form').addEventListener('submit', e => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const user = teachersData.find(t => t.user === u && t.pass === p);
            if (user) { currentUser = user; startDashboard(); }
            else { document.getElementById('login-error').classList.remove('hidden'); }
        });

        function startDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = currentUser.nama;
            document.getElementById('user-display-class').innerText = currentUser.kelas;
            document.getElementById('rekap-title-kelas').innerText = currentUser.kelas;
            
            document.querySelectorAll('.user-name-readonly').forEach(e => e.innerText = currentUser.nama);
            document.querySelectorAll('.user-class-readonly').forEach(e => e.innerText = currentUser.kelas);
            
            // Filter Siswa Berdasarkan Kelas Guru
            const selectSiswa = document.getElementById('select-siswa');
            selectSiswa.innerHTML = '<option value="">Pilih Murid...</option>';
            studentsData.filter(s => s.kelas.toLowerCase() === currentUser.kelas.toLowerCase())
                        .sort((a,b) => a.nama.localeCompare(b.nama))
                        .forEach(s => selectSiswa.innerHTML += `<option value="${s.nama}">${s.nama}</option>`);
            
            showSection('jurnal');
        }

        function showSection(id) {
            currentTab = id;
            ['jurnal', 'admin', 'catatan'].forEach(s => {
                document.getElementById(`section-${s}`).classList.add('hidden');
                document.getElementById(`tab-${s}`).className = "p-3 md:p-4 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black transition-all flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 border border-white/5 text-slate-500";
            });
            const activeColors = {
                jurnal: 'bg-blue-600 text-white shadow-blue-500/20',
                admin: 'bg-indigo-600 text-white shadow-indigo-500/20',
                catatan: 'bg-orange-600 text-white shadow-orange-500/20'
            };
            document.getElementById(`section-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).className = `p-3 md:p-4 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black transition-all flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 shadow-lg ${activeColors[id]}`;
            fetchRekap(id);
        }

        async function fetchRekap(type) {
            const body = document.getElementById('rekap-body');
            const col2 = document.getElementById('col-2');
            const col3 = document.getElementById('col-3');
            body.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-blue-400 animate-pulse">Menghubungkan ke server...</td></tr>';
            
            try {
                const res = await fetch(`${WEB_APP_URL}?type=${type}&_=${Date.now()}`);
                const all = await res.json();
                const filtered = all.filter(i => (i.kelas || "").toLowerCase() === currentUser.kelas.toLowerCase());

                if (type === 'jurnal') {
                    col2.innerText = "Mapel"; col3.innerText = "Materi";
                    body.innerHTML = filtered.map(i => `
                        <tr class="bg-white/5 border-b border-white/5 animate-fade">
                            <td class="px-4 py-3 text-[10px] text-slate-500">${i.waktu || ''}</td>
                            <td class="px-4 py-3 font-bold">${i.mapel || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs">${i.topik || ''}</td>
                            <td class="px-4 py-3 text-right">${i.link ? `<button onclick="openPreview('${i.link}', '${i.mapel}', '${i.topik}')" class="text-blue-400 bg-blue-400/10 px-3 py-1 rounded-lg">LIHAT</button>` : ''}</td>
                        </tr>`).join('') || '<tr><td colspan="4" class="p-8 text-center text-slate-600">Kosong</td></tr>';
                } else if (type === 'admin') {
                    col2.innerText = "Perangkat"; col3.innerText = "Info";
                    body.innerHTML = filtered.map(i => `
                        <tr class="bg-white/5 border-b border-white/5 animate-fade">
                            <td class="px-4 py-3 text-[10px] text-slate-500">${i.waktu || ''}</td>
                            <td class="px-4 py-3 font-bold text-indigo-400">${i.jenis || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs italic">Tersimpan</td>
                            <td class="px-4 py-3 text-right"><button onclick="openPreview('${i.link}', '${i.jenis}', 'ADMINISTRASI')" class="text-indigo-400 bg-indigo-400/10 px-3 py-1 rounded-lg">BUKA</button></td>
                        </tr>`).join('') || '<tr><td colspan="4" class="p-8 text-center text-slate-600">Kosong</td></tr>';
                } else if (type === 'catatan') {
                    col2.innerText = "Siswa"; col3.innerText = "Kategori";
                    body.innerHTML = filtered.map(i => `
                        <tr class="bg-white/5 border-b border-white/5 animate-fade">
                            <td class="px-4 py-3 text-[10px] text-slate-500">${i.waktu || ''}</td>
                            <td class="px-4 py-3 font-bold text-orange-400">${i.siswa || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs">${i.jenis || ''}</td>
                            <td class="px-4 py-3 text-right text-[10px] italic">${i.tindakan || ''}</td>
                        </tr>`).join('') || '<tr><td colspan="4" class="p-8 text-center text-slate-600">Kosong</td></tr>';
                }
            } catch (e) { body.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-400">Gagal memuat log.</td></tr>'; }
        }

        async function saveData(type, data, btnId) {
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin mr-2"></i> MENGIRIM...';
            btn.disabled = true;
            try {
                const payload = { ...data, type, guru: currentUser.nama, kelas: currentUser.kelas };
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                showModal("BERHASIL", "Data telah sinkron dengan server.", "success");
                document.getElementById(`form-${type}`).reset();
                fetchRekap(type);
            } catch (e) { showModal("GAGAL", "Gagal mengirim data. Cek koneksi.", "error"); }
            btn.innerText = originalText; btn.disabled = false;
        }

        // Event Listeners Forms
        document.getElementById('form-jurnal').addEventListener('submit', e => {
            e.preventDefault();
            saveData('jurnal', { 
                mapel: document.getElementById('jurnal-mapel').value,
                topik: document.getElementById('jurnal-topik').value,
                tujuan: document.getElementById('jurnal-tujuan').value,
                link: document.getElementById('jurnal-link').value
            }, 'btn-jurnal');
        });

        document.getElementById('form-admin').addEventListener('submit', e => {
            e.preventDefault();
            saveData('admin', { 
                jenis: document.getElementById('admin-jenis').value,
                link: document.getElementById('admin-link').value
            }, 'btn-admin');
        });

        document.getElementById('form-catatan').addEventListener('submit', e => {
            e.preventDefault();
            saveData('catatan', { 
                siswa: document.getElementById('select-siswa').value,
                jenis: document.getElementById('catatan-jenis').value,
                keterangan: document.getElementById('catatan-keterangan').value,
                tindakan: document.getElementById('catatan-tindakan').value
            }, 'btn-catatan');
        });

        function openPreview(url, title, subtitle) {
            let pUrl = url;
            if (url.includes('drive.google.com') && url.includes('/view')) pUrl = url.replace('/view', '/preview');
            document.getElementById('preview-frame').src = pUrl;
            document.getElementById('preview-title').innerText = title;
            document.getElementById('preview-subtitle').innerText = subtitle;
            document.getElementById('preview-download').href = url;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-frame').src = "about:blank";
            document.body.style.overflow = 'auto';
        }

        function showModal(title, msg, type) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            const icon = document.getElementById('modal-icon');
            icon.className = `w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border ${type === 'success' ? 'bg-green-500/10 border-green-500 text-green-500' : 'bg-red-500/10 border-red-500 text-red-500'}`;
            icon.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'times'} fa-2x"></i>`;
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('success-modal').classList.add('hidden'); }
        function logout() { location.reload(); }
        function refreshData() { fetchRekap(currentTab); }

        window.onload = init;
    </script>
</body>
</html>
