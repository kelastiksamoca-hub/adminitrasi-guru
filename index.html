<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Administrasi Guru - Format Tanggal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Library untuk Export Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root { --rgb-speed: 3s; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rgb-line::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000);
            background-size: 200% auto;
            animation: rgb-move var(--rgb-speed) linear infinite;
        }

        .rgb-border { position: relative; }
        .rgb-border::before {
            content: '';
            position: absolute;
            inset: -1px; padding: 1px; border-radius: inherit;
            background: linear-gradient(90deg, #ff0000, #00ff00, #00ffff, #ff0000);
            background-size: 200% auto;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rgb-move var(--rgb-speed) linear infinite;
            pointer-events: none;
        }

        @keyframes rgb-move { to { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input, select, textarea {
            background: rgba(15, 23, 42, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            font-size: 16px !important;
        }

        .iframe-wrapper {
            position: relative; width: 100%; height: 65vh;
            border-radius: 0.75rem; overflow: hidden; background: #1e293b;
        }

        iframe { width: 100%; height: 100%; border: none; }
        .custom-scrollbar-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#0f172a] z-[200] flex flex-col items-center justify-center text-center p-6">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-400 font-bold tracking-widest uppercase">Sinkronisasi Sistem...</p>
    </div>

    <!-- Login -->
    <div id="login-screen" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="glass-card rgb-border w-full max-w-md p-8 md:p-10 rounded-3xl shadow-2xl animate-fade text-center">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-lock fa-xl"></i></div>
            <h1 class="text-2xl font-black text-white mb-6 tracking-tight">PORTAL SIP-GURU</h1>
            <form id="login-form" class="space-y-4 text-left">
                <input type="text" id="username" required class="w-full px-4 py-3 border rounded-xl" placeholder="Username">
                <input type="password" id="password" required class="w-full px-4 py-3 border rounded-xl" placeholder="Password">
                <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">MASUK SISTEM</button>
            </form>
            <p id="login-error" class="hidden mt-4 text-red-400 text-xs">Gagal Login! Periksa kredensial.</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="glass-card border-b border-white/5 sticky top-0 z-50 rgb-line">
            <div class="container mx-auto px-4 md:px-6 h-16 md:h-20 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white p-2 rounded-lg"><i class="fas fa-database"></i></div>
                    <span class="font-black text-xl md:text-2xl text-white">SIP<span class="text-blue-500">GURU</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-name" class="text-xs font-bold text-white"></p>
                        <p id="user-display-class" class="text-[9px] font-black text-blue-400 uppercase tracking-tighter"></p>
                    </div>
                    <button onclick="logout()" class="w-10 h-10 rounded-full bg-white/5 text-slate-400 hover:text-red-500 border border-white/10 transition-all"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-4 md:px-6 py-6 md:py-10 animate-fade flex-grow">
            <!-- Tabs -->
            <div class="grid grid-cols-3 gap-2 md:gap-4 mb-8">
                <button onclick="showSection('jurnal')" id="tab-jurnal" class="p-3 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black flex flex-col md:flex-row items-center justify-center gap-2 border border-white/5">
                    <i class="fas fa-book-open"></i> JURNAL
                </button>
                <button onclick="showSection('admin')" id="tab-admin" class="p-3 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black flex flex-col md:flex-row items-center justify-center gap-2 border border-white/5">
                    <i class="fas fa-shield-halved"></i> ADMIN
                </button>
                <button onclick="showSection('catatan')" id="tab-catatan" class="p-3 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black flex flex-col md:flex-row items-center justify-center gap-2 border border-white/5">
                    <i class="fas fa-user-shield"></i> CATATAN
                </button>
            </div>

            <div class="grid grid-cols-1 gap-8">
                <!-- Form Input -->
                <div class="glass-card rgb-border p-6 md:p-8 rounded-3xl shadow-xl">
                    <section id="section-jurnal" class="space-y-4">
                        <h2 class="text-xl font-black italic flex items-center gap-2"><i class="fas fa-pen-nib text-blue-500"></i> JURNAL MENGAJAR</h2>
                        <form id="form-jurnal" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select id="jurnal-mapel" required class="px-4 py-3 border rounded-xl"></select>
                            <input type="text" id="jurnal-topik" required class="px-4 py-3 border rounded-xl" placeholder="Topik Materi">
                            <textarea id="jurnal-tujuan" required rows="2" class="col-span-full px-4 py-3 border rounded-xl" placeholder="Tujuan Pembelajaran"></textarea>
                            <input type="url" id="jurnal-link" class="col-span-full px-4 py-3 border rounded-xl" placeholder="Link Drive Dokumen">
                            <button type="submit" id="btn-jurnal" class="col-span-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-xl">SIMPAN JURNAL</button>
                        </form>
                    </section>

                    <section id="section-admin" class="hidden space-y-4">
                        <h2 class="text-xl font-black italic flex items-center gap-2 text-indigo-400"><i class="fas fa-file-invoice"></i> PERANGKAT AJAR</h2>
                        <form id="form-admin" class="space-y-4">
                            <select id="admin-jenis" required class="w-full px-4 py-3 border rounded-xl"></select>
                            <input type="url" id="admin-link" required class="w-full px-4 py-3 border rounded-xl" placeholder="Link Dokumen">
                            <button type="submit" id="btn-admin" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-xl">UNGGAH PERANGKAT</button>
                        </form>
                    </section>

                    <section id="section-catatan" class="hidden space-y-4">
                        <h2 class="text-xl font-black italic flex items-center gap-2 text-orange-400"><i class="fas fa-user-check"></i> CATATAN SISWA</h2>
                        <form id="form-catatan" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <select id="select-siswa" required class="px-4 py-3 border rounded-xl"></select>
                                <select id="catatan-jenis" required class="px-4 py-3 border rounded-xl"></select>
                            </div>
                            <textarea id="catatan-keterangan" required rows="2" class="w-full px-4 py-3 border rounded-xl" placeholder="Keterangan Kejadian"></textarea>
                            <input type="text" id="catatan-tindakan" required class="w-full px-4 py-3 border rounded-xl" placeholder="Tindak Lanjut">
                            <button type="submit" id="btn-catatan" class="w-full bg-orange-600 text-white font-black py-4 rounded-xl shadow-xl">SIMPAN CATATAN</button>
                        </form>
                    </section>
                </div>

                <!-- Rekap Section -->
                <div class="glass-card p-6 rounded-3xl border border-white/5 overflow-hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div>
                            <h3 class="font-black text-slate-200 tracking-widest text-sm flex items-center gap-2 uppercase">
                                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                Log <span id="log-type-label">Jurnal</span> Kelas <span id="rekap-title-kelas" class="text-blue-400"></span>
                            </h3>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full md:w-auto">
                            <button onclick="exportToExcel()" class="flex-1 md:flex-none text-[10px] bg-green-600/20 hover:bg-green-600 text-green-500 hover:text-white px-4 py-2 rounded-lg font-bold border border-green-500/30 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-file-excel"></i> DOWNLOAD EXCEL
                            </button>
                            <button onclick="refreshData()" class="flex-1 md:flex-none text-[10px] bg-white/5 hover:bg-white/10 text-blue-400 px-4 py-2 rounded-lg font-bold border border-white/5 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-sync-alt"></i> REFRESH
                            </button>
                        </div>
                    </div>
                    <div class="custom-scrollbar-x">
                        <table id="table-rekap" class="w-full text-xs md:text-sm text-left border-separate border-spacing-y-2">
                            <thead class="text-slate-500 font-black uppercase text-[9px] tracking-widest">
                                <tr>
                                    <th class="px-4 py-2">Tanggal</th>
                                    <th class="px-4 py-2" id="col-2">Info 1</th>
                                    <th class="px-4 py-2" id="col-3">Info 2</th>
                                    <th class="px-4 py-2" id="col-4">Detail</th>
                                    <th class="px-4 py-2 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="rekap-body" class="text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Iframe Modal -->
    <div id="preview-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex flex-col z-[150]">
        <div class="p-4 md:p-6 flex justify-between items-center border-b border-white/10">
            <div class="truncate">
                <h3 class="text-white font-black text-sm md:text-lg italic truncate" id="preview-title">DOKUMEN PREVIEW</h3>
                <p class="text-blue-400 text-[10px] uppercase tracking-widest" id="preview-subtitle"></p>
            </div>
            <button onclick="closePreview()" class="bg-red-500 text-white w-10 h-10 rounded-full hover:scale-110 transition-all"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-grow p-4 md:p-6">
            <div class="iframe-wrapper rgb-border h-full"><iframe id="preview-frame" src="about:blank"></iframe></div>
        </div>
        <div class="p-4 flex justify-center"><a id="preview-download" href="#" target="_blank" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs shadow-lg">BUKA TAB BARU</a></div>
    </div>

    <!-- Alert Modal -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="glass-card rgb-border p-8 rounded-3xl max-w-xs w-full text-center animate-fade">
            <div id="modal-icon" class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border"></div>
            <h3 id="modal-title" class="text-xl font-black text-white">STATUS</h3>
            <p id="modal-msg" class="text-slate-400 text-sm mt-2 mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-sm">OKE</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxLjQ1MovYf_exWe5xjjLPnjfOYefVZGAf4buomwIcGs0DlXSUD7Ndi56NiWEXd5V9R_Q/exec"; 
        const TEACHERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFecIGSQIWeOFg9Vbl2oGz-B1mQ8h7b72h2VJ0PvgWZ1oXjruHFj_ok6bG9Cw_gV02Z0OY_epNAX-w/pub?gid=0&single=true&output=csv";
        const STUDENTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Mx_6kiws1Pt-kH14kXpp0nT36dNQyOa_7cWkMjyfoIv2TAsPzpjFeHJtKOZoGfNDDltRzAoqlVac/pub?gid=0&single=true&output=csv";
        
        let teachersData = [], studentsData = [], currentUser = null, currentTab = 'jurnal', activeLogs = [];

        async function init() {
            try {
                const [tRes, sRes] = await Promise.all([fetch(TEACHERS_CSV_URL), fetch(STUDENTS_CSV_URL)]);
                teachersData = parseCSV(await tRes.text(), ['nama', 'kelas', 'user', 'pass']);
                studentsData = parseCSV(await sRes.text(), ['id', 'nama', 'jk', 'kelas']);
                
                fillSelect('jurnal-mapel', ["Pendidikan Agama", "Pendidikan Pancasila", "Bahasa Indonesia", "Matematika", "IPAS", "PJOK", "Seni Musik", "Seni Rupa", "Seni Tari", "Bahasa Sunda", "Bahasa Inggris", "Informatika"]);
                fillSelect('admin-jenis', ["CP", "TP", "ATP", "PROTA", "PROMES", "MODUL AJAR", "BANK SOAL", "Analisis Soal", "Bahan Ajar (PPT)"]);
                fillSelect('catatan-jenis', ["Kedisiplinan", "Kebersihan", "Sikap/Perilaku", "Tugas/Akademik"]);

                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            } catch (err) { alert("Koneksi gagal. Cek internet Anda."); }
        }

        function parseCSV(csv, keys) {
            return csv.split('\n').slice(1).filter(r => r.trim()).map(row => {
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                let obj = {}; keys.forEach((key, i) => obj[key] = cols[i]);
                return obj;
            });
        }

        function fillSelect(id, items) {
            const s = document.getElementById(id);
            s.innerHTML = `<option value="">Pilih...</option>`;
            items.forEach(i => s.innerHTML += `<option value="${i}">${i}</option>`);
        }

        // Fungsi Helper untuk format tanggal saja (Tgl, Bln, Thn)
        function formatDateOnly(timestamp) {
            if (!timestamp) return '-';
            // Mencoba mengekstrak bagian tanggal dari format ISO atau format teks biasa
            // Jika formatnya '2023-10-25T10:00:00', ambil bagian sebelum 'T'
            // Jika formatnya '25/10/2023 10:00:00', ambil bagian sebelum spasi
            const parts = timestamp.split(/[T\s]/);
            return parts[0]; 
        }

        document.getElementById('login-form').addEventListener('submit', e => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const user = teachersData.find(t => t.user === u && t.pass === p);
            if (user) { currentUser = user; startDashboard(); }
            else { document.getElementById('login-error').classList.remove('hidden'); }
        });

        function startDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = currentUser.nama;
            document.getElementById('user-display-class').innerText = currentUser.kelas;
            document.getElementById('rekap-title-kelas').innerText = currentUser.kelas;
            
            const selectSiswa = document.getElementById('select-siswa');
            selectSiswa.innerHTML = '<option value="">Pilih Murid...</option>';
            studentsData.filter(s => s.kelas.toLowerCase() === currentUser.kelas.toLowerCase())
                        .sort((a,b) => a.nama.localeCompare(b.nama))
                        .forEach(s => selectSiswa.innerHTML += `<option value="${s.nama}">${s.nama}</option>`);
            
            showSection('jurnal');
        }

        function showSection(id) {
            currentTab = id;
            document.getElementById('log-type-label').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            ['jurnal', 'admin', 'catatan'].forEach(s => {
                document.getElementById(`section-${s}`).classList.add('hidden');
                document.getElementById(`tab-${s}`).className = "p-3 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black flex flex-col md:flex-row items-center justify-center gap-2 border border-white/5 text-slate-500 transition-all";
            });
            const colors = { jurnal: 'bg-blue-600', admin: 'bg-indigo-600', catatan: 'bg-orange-600' };
            document.getElementById(`section-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).className = `p-3 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black flex flex-col md:flex-row items-center justify-center gap-2 shadow-lg ${colors[id]} text-white`;
            fetchRekap(id);
        }

        async function fetchRekap(type) {
            const body = document.getElementById('rekap-body');
            const cols = [document.getElementById('col-2'), document.getElementById('col-3'), document.getElementById('col-4')];
            body.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-blue-400 animate-pulse">Memuat Data...</td></tr>';
            
            try {
                const res = await fetch(`${WEB_APP_URL}?type=${type}&_=${Date.now()}`);
                const all = await res.json();
                activeLogs = all.filter(i => (i.kelas || "").toLowerCase() === currentUser.kelas.toLowerCase());

                if (type === 'jurnal') {
                    cols[0].innerText = "Mapel"; cols[1].innerText = "Materi"; cols[2].innerText = "Tujuan";
                    body.innerHTML = activeLogs.map(i => `
                        <tr class="bg-white/5 animate-fade">
                            <td class="px-4 py-3 text-[10px] text-slate-500">${formatDateOnly(i.waktu)}</td>
                            <td class="px-4 py-3 font-bold">${i.mapel || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs">${i.topik || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-[10px] max-w-[150px] truncate">${i.tujuan || ''}</td>
                            <td class="px-4 py-3 text-right">${i.link ? `<button onclick="openPreview('${i.link}', '${i.mapel}', '${i.topik}')" class="text-blue-400 bg-blue-400/10 px-3 py-1 rounded-lg">LIHAT</button>` : ''}</td>
                        </tr>`).join('') || '<tr><td colspan="5" class="p-8 text-center text-slate-600">Kosong</td></tr>';
                } else if (type === 'admin') {
                    cols[0].innerText = "Perangkat"; cols[1].innerText = "Status"; cols[2].innerText = "Guru";
                    body.innerHTML = activeLogs.map(i => `
                        <tr class="bg-white/5 animate-fade">
                            <td class="px-4 py-3 text-[10px] text-slate-500">${formatDateOnly(i.waktu)}</td>
                            <td class="px-4 py-3 font-bold text-indigo-400">${i.jenis || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs">Tersimpan</td>
                            <td class="px-4 py-3 text-slate-400 text-[10px]">${i.guru || ''}</td>
                            <td class="px-4 py-3 text-right"><button onclick="openPreview('${i.link}', '${i.jenis}', 'ADMIN')" class="text-indigo-400 bg-indigo-400/10 px-3 py-1 rounded-lg">BUKA</button></td>
                        </tr>`).join('') || '<tr><td colspan="5" class="p-8 text-center text-slate-600">Kosong</td></tr>';
                } else if (type === 'catatan') {
                    cols[0].innerText = "Siswa"; cols[1].innerText = "Kategori"; cols[2].innerText = "Tindakan";
                    body.innerHTML = activeLogs.map(i => `
                        <tr class="bg-white/5 animate-fade">
                            <td class="px-4 py-3 text-[10px] text-slate-500">${formatDateOnly(i.waktu)}</td>
                            <td class="px-4 py-3 font-bold text-orange-400">${i.siswa || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs">${i.jenis || ''}</td>
                            <td class="px-4 py-3 text-slate-400 text-[10px]">${i.tindakan || ''}</td>
                            <td class="px-4 py-3 text-right text-[10px] italic">${i.keterangan || ''}</td>
                        </tr>`).join('') || '<tr><td colspan="5" class="p-8 text-center text-slate-600">Kosong</td></tr>';
                }
            } catch (e) { body.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-400">Gagal Memuat.</td></tr>'; }
        }

        async function saveData(type, data, btnId) {
            const btn = document.getElementById(btnId);
            btn.innerHTML = 'MENGIRIM...'; btn.disabled = true;
            try {
                const payload = { ...data, type, guru: currentUser.nama, kelas: currentUser.kelas };
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                showModal("BERHASIL", "Data telah disinkronkan ke server pusat.", "success");
                document.getElementById(`form-${type}`).reset();
                fetchRekap(type);
            } catch (e) { showModal("GAGAL", "Gagal mengirim data.", "error"); }
            btn.innerHTML = 'SIMPAN DATA'; btn.disabled = false;
        }

        function exportToExcel() {
            if (activeLogs.length === 0) {
                showModal("DATA KOSONG", "Tidak ada data untuk diunduh.", "error");
                return;
            }
            const excelData = activeLogs.map(item => {
                const row = { "Tanggal": formatDateOnly(item.waktu) };
                if (currentTab === 'jurnal') {
                    row["Guru"] = item.guru; row["Kelas"] = item.kelas; row["Mata Pelajaran"] = item.mapel;
                    row["Topik"] = item.topik; row["Tujuan Pembelajaran"] = item.tujuan; row["Link Dokumen"] = item.link;
                } else if (currentTab === 'admin') {
                    row["Guru"] = item.guru; row["Kelas"] = item.kelas; row["Jenis Perangkat"] = item.jenis; row["Link Akses"] = item.link;
                } else if (currentTab === 'catatan') {
                    row["Nama Siswa"] = item.siswa; row["Kategori Pelanggaran"] = item.jenis;
                    row["Detail Kejadian"] = item.keterangan; row["Tindak Lanjut"] = item.tindakan;
                }
                return row;
            });
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Rekap Data");
            const fileName = `Rekap_${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)}_${currentUser.kelas.replace(' ', '_')}.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }

        // Event Listeners
        document.getElementById('form-jurnal').addEventListener('submit', e => { e.preventDefault(); saveData('jurnal', { mapel: document.getElementById('jurnal-mapel').value, topik: document.getElementById('jurnal-topik').value, tujuan: document.getElementById('jurnal-tujuan').value, link: document.getElementById('jurnal-link').value }, 'btn-jurnal'); });
        document.getElementById('form-admin').addEventListener('submit', e => { e.preventDefault(); saveData('admin', { jenis: document.getElementById('admin-jenis').value, link: document.getElementById('admin-link').value }, 'btn-admin'); });
        document.getElementById('form-catatan').addEventListener('submit', e => { e.preventDefault(); saveData('catatan', { siswa: document.getElementById('select-siswa').value, jenis: document.getElementById('catatan-jenis').value, keterangan: document.getElementById('catatan-keterangan').value, tindakan: document.getElementById('catatan-tindakan').value }, 'btn-catatan'); });

        function openPreview(url, title, subtitle) {
            let pUrl = url;
            if (url.includes('drive.google.com') && url.includes('/view')) pUrl = url.replace('/view', '/preview');
            document.getElementById('preview-frame').src = pUrl;
            document.getElementById('preview-title').innerText = title;
            document.getElementById('preview-subtitle').innerText = subtitle;
            document.getElementById('preview-download').href = url;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePreview() { document.getElementById('preview-modal').classList.add('hidden'); document.getElementById('preview-frame').src = "about:blank"; document.body.style.overflow = 'auto'; }
        function showModal(title, msg, type) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-msg').innerText = msg; const icon = document.getElementById('modal-icon'); icon.className = `w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border ${type === 'success' ? 'bg-green-500/10 border-green-500 text-green-500' : 'bg-red-500/10 border-red-500 text-red-500'}`; icon.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'times'} fa-2x"></i>`; document.getElementById('success-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('success-modal').classList.add('hidden'); }
        function logout() { location.reload(); }
        function refreshData() { fetchRekap(currentTab); }
        window.onload = init;
    </script>
</body>
</html>
